<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Planet Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    canvas { display: block; }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.5s;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
    }
  }
  </script>
</head>
<body>
<div id="loading">Loading...</div>
<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  const urlParams = new URLSearchParams(window.location.search);
  const planetName = urlParams.get('planet') || 'earth';

  // Scene setup
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
  camera.position.set(0, 0, 15);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  const controls = new OrbitControls(camera, renderer.domElement);
  
  // Base lights
  const ambientLight = new THREE.AmbientLight(0x333333);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
  directionalLight.position.set(50, 30, 50);
  scene.add(directionalLight);

  // Background stars
  const starGeometry = new THREE.BufferGeometry();
  const starPositions = [];
  for (let i = 0; i < 4000; i++) {
    starPositions.push((Math.random() - 0.5) * 5000, (Math.random() - 0.5) * 5000, (Math.random() - 0.5) * 5000);
  }
  starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 2 });
  const stars = new THREE.Points(starGeometry, starMaterial);
  scene.add(stars);

  const textureLoader = new THREE.TextureLoader();
  let composer = null;
  let updateCallbacks = [];

  const hideLoading = () => document.getElementById('loading').style.opacity = 0;

  function loadPlanet() {
    switch (planetName.toLowerCase()) {
      case 'earth':
        setupEarth();
        break;
      case 'sun':
        setupSun();
        break;
      case 'saturn':
        setupSaturn();
        break;
      default:
        setupGeneric(planetName);
        break;
    }
  }

  function setupEarth() {
    camera.position.set(0, 0, 6);
    controls.minDistance = 2.8;
    controls.maxDistance = 15;

    const texDay = textureLoader.load("./img_earth/earth_day_4096.jpg", hideLoading);
    const texNight = textureLoader.load("./img_earth/earth_night_4096.jpg");
    const texClouds = textureLoader.load("./img_earth/earth_clouds_1024.png");

    const lightDir = new THREE.Vector3(5, 3, 5).normalize();
    directionalLight.position.copy(lightDir.clone().multiplyScalar(10));

    const earthMaterial = new THREE.ShaderMaterial({
      uniforms: {
        dayTex: { value: texDay },
        nightTex: { value: texNight },
        lightDirection: { value: lightDir },
      },
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vNormal;
        void main() {
          vUv = uv;
          vNormal = normalize(normalMatrix * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D dayTex;
        uniform sampler2D nightTex;
        uniform vec3 lightDirection;
        varying vec2 vUv;
        varying vec3 vNormal;
        void main() {
          float light = dot(normalize(vNormal), normalize(lightDirection));
          light = clamp(light, 0.0, 1.0);
          vec4 dayColor = texture2D(dayTex, vUv);
          vec4 nightColor = texture2D(nightTex, vUv);
          vec4 color = mix(nightColor, dayColor, light);
          gl_FragColor = color;
        }
      `
    });

    const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(2, 64, 64), earthMaterial);
    scene.add(earthMesh);

    const cloudMesh = new THREE.Mesh(
      new THREE.SphereGeometry(2.02, 64, 64),
      new THREE.MeshPhongMaterial({ map: texClouds, transparent: true, opacity: 0.4, depthWrite: false })
    );
    scene.add(cloudMesh);

    updateCallbacks.push(() => {
      earthMesh.rotation.y += 0.001;
      cloudMesh.rotation.y += 0.0015;
      const rotationMatrix = new THREE.Matrix4().makeRotationY(earthMesh.rotation.y);
      const dynamicLightDir = new THREE.Vector3(5, 3, 5).applyMatrix4(rotationMatrix).normalize();
      earthMaterial.uniforms.lightDirection.value = dynamicLightDir;
      directionalLight.position.copy(dynamicLightDir.clone().multiplyScalar(10));
    });
  }

  function setupSun() {
    camera.position.set(0, 0, 60);
    controls.minDistance = 11;
    controls.maxDistance = 60;
    scene.remove(directionalLight);

    const fireTexture = textureLoader.load('./img_others/8k_sun.jpg', hideLoading);
    fireTexture.wrapS = fireTexture.wrapT = THREE.RepeatWrapping;

    const sunMaterial = new THREE.MeshStandardMaterial({
      map: fireTexture,
      emissive: new THREE.Color(0xffaa00),
      emissiveMap: fireTexture,
      emissiveIntensity: 2
    });

    const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(10, 18, 18), sunMaterial);
    scene.add(sunMesh);

    const sunLight = new THREE.PointLight(0xffddaa, 10, 1000);
    scene.add(sunLight);

    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85));

    updateCallbacks.push(() => {
      fireTexture.offset.x += 0.001;
      fireTexture.offset.y += 0.001;
      sunMesh.rotation.y += 0.002;
    });
  }

  function setupSaturn() {
    camera.position.set(0, 10, 25);
    controls.minDistance = 5.9;
    controls.maxDistance = 35;

    const planetTexture = textureLoader.load("./img_others/8k_saturn.jpg", hideLoading);
    const rockTexture = textureLoader.load("./img_others/cream.jpeg");
    const rock2Texture = textureLoader.load("./img_others/stone_brown.jpg");

    const planetMesh = new THREE.Mesh(
      new THREE.SphereGeometry(5, 64, 64),
      new THREE.MeshStandardMaterial({ map: planetTexture, bumpMap: planetTexture, bumpScale: 0.05, roughness: 1 })
    );
    scene.add(planetMesh);

    function createStoneRing(innerRadius, outerRadius, stoneCount, texture, opacity = 0.06) {
      const ringGroup = new THREE.Group();
      const stoneGeometry = new THREE.SphereGeometry(0.1, 6, 6);
      const stoneMaterial = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.8, opacity: opacity, transparent: true });
      for (let i = 0; i < stoneCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = innerRadius + Math.random() * (outerRadius - innerRadius);
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const y = (Math.random() - 0.5) * 0.5;
        const stone = new THREE.Mesh(stoneGeometry, stoneMaterial);
        stone.position.set(x, y, z);
        stone.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
        const scale = 0.5 + Math.random() * 0.7;
        stone.scale.set(scale, scale, scale);
        ringGroup.add(stone);
      }
      return ringGroup;
    }

    const mergedRing = new THREE.Group();
    // Reduced stone count slightly for generic performance since we load dynamically
    mergedRing.add(createStoneRing(7, 7.5, 3000, rock2Texture, 0.06));
    mergedRing.add(createStoneRing(7.5, 8.1, 1000, rockTexture, 0.06));
    mergedRing.add(createStoneRing(8.1, 9.3, 3000, rock2Texture, 0.06));
    mergedRing.add(createStoneRing(9.3, 11.3, 3000, rockTexture, 0.06));
    mergedRing.rotation.x = 0.05;
    scene.add(mergedRing);

    updateCallbacks.push(() => {
      planetMesh.rotation.y += 0.01;
      mergedRing.rotation.y += 0.005;
    });
  }

  function setupGeneric(name) {
    camera.position.set(0, 0, 6);
    controls.minDistance = 2.9;
    controls.maxDistance = 15;

    let texturePath = '';
    if (name === 'mercury') texturePath = './img_others/8k_mercury.jpg';
    else if (name === 'venus') texturePath = './img_others/8k_venus_surface.jpg';
    else if (name === 'mars') texturePath = './img_others/8k_mars.jpg';
    else if (name === 'jupiter') texturePath = './img_others/8k_jupiter.jpg';
    else if (name === 'uranus') texturePath = './img_others/2k_uranus.jpg';
    else if (name === 'neptune') texturePath = './img_others/2k_neptune.jpg';
    else texturePath = './img_others/8k_mercury.jpg'; // fallback

    const planetTexture = textureLoader.load(texturePath, hideLoading);

    const planetMesh = new THREE.Mesh(
      new THREE.SphereGeometry(2, 64, 64),
      new THREE.MeshPhongMaterial({ map: planetTexture, bumpMap: planetTexture, bumpScale: 0.05, roughness: 1 })
    );
    scene.add(planetMesh);

    updateCallbacks.push(() => {
      planetMesh.rotation.y += 0.001;
    });
  }

  loadPlanet();

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    updateCallbacks.forEach(cb => cb());
    if (composer) {
      composer.render();
    } else {
      renderer.render(scene, camera);
    }
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    if (composer) composer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
